<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Patient Dashboard</title>
	</head>
	<style>
		.doctor-card {
			border: 1px solid #ccc;
			padding: 12px;
			margin: 10px 0;
			border-radius: 8px;
			cursor: pointer;
			background: white;
		}

		.doctor-card:hover {
			background: #f5f5f5;
		}

		.doctor-card.selected {
			border: 2px solid blue;
			background: #e6f0ff;
		}
		.appointment-card {
			border: 1px solid #ccc;
			padding: 12px;
			margin: 10px 0;
			border-radius: 8px;
			cursor: pointer;
			background: white;
		}

		.appointment-card:hover {
			background: #f5f5f5;
		}

		.appointment-card.selected {
			border: 2px solid blue;
			background: #e6f0ff;
		}
	</style>
	<body>
		<h1>My Profile</h1>

		<div><strong>Name:</strong> <span id="name"></span></div>
		<div><strong>Email:</strong> <span id="email"></span></div>
		<div><strong>Phone:</strong> <span id="phone"></span></div>
		<div><strong>DOB:</strong> <span id="dob"></span></div>
		<div><strong>Gender:</strong> <span id="gender"></span></div>
		<div id="specializationBox" style="display: none">
			<strong>Specialization:</strong> <span id="specialization"></span>
		</div>
		<h1>Request Appointment</h1>
		<form id="reqappointment">
			<input type="hidden" id="selectedDoctorId" />

			<h1>Doctor List</h1>

			<div id="status"></div>
			<div id="doctorContainer"></div>
			<!-- <div id="debugBox" class="debug"></div> -->

			<input type="date" id="date" name="date" required />

			<select id="category" name="category" required>
				<option value="">Select an option</option>
				<option value="9:00AM">9:00AM</option>
				<option value="10:30 AM">10:30 AM</option>
				<option value="11:15 AM">11:15 AM</option>
				<option value="3:00 PM">3:00 PM</option>
				<option value="7:00 PM">7:00 PM</option>
			</select>

			<input
				type="text"
				id="textInput"
				name="textInput"
				placeholder="Enter text"
				required
			/>

			<button type="submit">Submit</button>
			<div id="formMessage"></div>
		</form>
		<h1>My Appointments</h1>
		<div id="appointmentstatus"></div>
		<div id="appointmentContainer"></div>
		<!-- <div id="debugBox1" class="debug"></div> -->

		<button id="deleteAccountBtn" type="button">Delete Account</button>

		<div id="deleteSection" style="display: none; margin-top: 15px">
			<button id="cancelDeleteBtn" type="button">No</button>

			<form id="deleteAccountForm" style="margin-top: 10px">
				<div>
					<label>Email:</label>
					<input type="email" id="deleteEmail" required />
				</div>

				<div>
					<label>Password:</label>
					<input type="password" id="deletePassword" required />
				</div>

				<div>
					<label>Confirm Password:</label>
					<input
						type="password"
						id="confirmDeletePassword"
						required
					/>
				</div>

				<div style="margin-top: 10px">
					<button type="submit">Confirm Delete</button>
				</div>

				<div style="margin-top: 10px">
					<input
						type="text"
						id="deleteMessage"
						readonly
						placeholder="Status message will appear here"
						style="width: 300px"
					/>
				</div>
			</form>
		</div>
	</body>
	<script>
		async function loadProfile() {
			try {
				const response = await fetch("/loaddata/userprofile");
				const data = await response.json();

				// if (!response.ok) {
				// 	alert(data.message || "Failed to load profile");
				// 	return;
				// }

				document.getElementById("name").textContent = data.name || "";
				document.getElementById("email").textContent = data.email || "";
				document.getElementById("phone").textContent = data.phone || "";
				document.getElementById("dob").textContent = data.dob || "";
				document.getElementById("gender").textContent =
					data.gender || "";

				if (data.role === "doctor") {
					document.getElementById("specializationBox").style.display =
						"block";
					document.getElementById("specialization").textContent =
						data.specialization || "";
				}
			} catch (err) {
				console.error(err);
				alert("Something went wrong");
			}
		}
		loadProfile();
		//doclist
		document.addEventListener("DOMContentLoaded", loadDoctors);
		let selectedDoctorId = null;

		async function loadDoctors() {
			const status = document.getElementById("status");
			const container = document.getElementById("doctorContainer");
			// const debugBox = document.getElementById("debugBox");

			status.textContent = "Loading doctor list...";
			container.innerHTML = "";
			// debugBox.textContent = "loadDoctors started\n";

			try {
				const response = await fetch("/loaddata/doctorlist");
				const data = await response.json();

				if (!response.ok) {
					throw new Error(
						data.message || `HTTP error ${response.status}`,
					);
				}

				if (!Array.isArray(data)) {
					throw new Error("Expected array data");
				}

				if (data.length === 0) {
					status.textContent = "No doctors found.";
					return;
				}

				status.textContent = `Loaded ${data.length} doctor(s).`;

				data.forEach((doc, index) => {
					const div = document.createElement("div");
					div.className = "doctor-card";
					div.dataset.id = doc.user_id;

					div.innerHTML = `
                    <div><strong>Row:</strong> ${index + 1}</div>
                    <div><strong>User ID:</strong> ${doc.user_id ?? "N/A"}</div>
                    <div><strong>Name:</strong> ${doc.name ?? "N/A"}</div>
                    <div><strong>Email:</strong> ${doc.email ?? "N/A"}</div>
                    <div><strong>Specialization:</strong> ${doc.specialization ?? "N/A"}</div>
                    <div><strong>Phone:</strong> ${doc.phone_no ?? "N/A"}</div>
                    <div><strong>DOB:</strong> ${doc.dob ?? "N/A"}</div>
                    <div><strong>Gender:</strong> ${doc.gender ?? "N/A"}</div>
                `;

					div.addEventListener("click", () => {
						document
							.querySelectorAll(".doctor-card")
							.forEach((card) => {
								card.classList.remove("selected");
							});

						div.classList.add("selected");
						selectedDoctorId = doc.user_id;
						document.getElementById("selectedDoctorId").value =
							doc.user_id;

						// debugBox.textContent = `Selected Doctor ID: ${selectedDoctorId}`;
					});

					container.appendChild(div);
				});
			} catch (err) {
				console.error("Failed to load doctors:", err);
				status.innerHTML = `<span style="color:red;">Failed to load doctor list.</span>`;
				// debugBox.textContent = `Error: ${err.message}`;
			}
		}

		//reqppointment
		document
			.getElementById("reqappointment")
			.addEventListener("submit", reqappointment);
		async function reqappointment(e) {
			e.preventDefault();

			const doctor_id = document.getElementById("selectedDoctorId").value;
			const date = document.getElementById("date").value;
			const category = document.getElementById("category").value;
			const textInput = document.getElementById("textInput").value;
			// const debugBox = document.getElementById("debugBox");
			const formMessage = document.getElementById("formMessage");

			formMessage.style.color = "black";
			formMessage.textContent = "Submitting...";

			// if (!doctor_id) {
			// 	alert("Please select one doctor");
			// 	return;
			// }

			try {
				const response = await fetch("/request/reqappointment", {
					method: "POST",
					headers: {
						"Content-Type": "application/json",
					},
					body: JSON.stringify({
						doctor_id,
						date,
						category,
						textInput,
					}),
				});

				const data = await response.json();

				if (!response.ok) {
					throw new Error(
						data.message || "Failed to create appointment",
					);
				}

				formMessage.style.color = "green";
				formMessage.textContent =
					data.message || "Appointment submitted successfully";
				// alert(data.message);
				// debugBox.textContent = JSON.stringify(data, null, 2);
				document.getElementById("reqappointment").reset();
				document.getElementById("selectedDoctorId").value = "";
				selectedDoctorId = null;
				document.querySelectorAll(".doctor-card").forEach((card) => {
					card.classList.remove("selected");
				});
			} catch (err) {
				console.error(err);
				// debugBox.textContent = err.message;
				// alert(err.message);
			}
		}
		document.addEventListener("DOMContentLoaded", loadAppointments);

		async function loadAppointments() {
			const status = document.getElementById("appointmentstatus");
			const container = document.getElementById("appointmentContainer");
			// const debugBox = document.getElementById("debugBox1");

			status.textContent = "Loading appointment list...";
			container.innerHTML = "";
			// debugBox.textContent = "";

			try {
				const response = await fetch("/loaddata/userappointmentlist");
				const contentType = response.headers.get("content-type") || "";

				let data;

				if (contentType.includes("application/json")) {
					data = await response.json();
				} else {
					const text = await response.text();
					throw new Error(
						"Server did not return JSON.\nResponse:\n" + text,
					);
				}

				if (!response.ok) {
					throw new Error(
						data.message || `HTTP error ${response.status}`,
					);
				}

				if (!Array.isArray(data)) {
					throw new Error(
						"Expected an array, but got: " + typeof data,
					);
				}

				if (data.length === 0) {
					status.textContent = "No appointments found.";
					return;
				}

				status.textContent = `Loaded ${data.length} appointment(s).`;
				// debugBox.textContent =
					// "Click any appointment card to open full details page.";

				data.forEach((item, index) => {
					const div = document.createElement("div");
					div.className = "appointment-card";
					div.dataset.id = item.appointment_id;
					div.style.cursor = "pointer";

					div.innerHTML = `
                <div><strong>Row:</strong> ${index + 1}</div>
                <div><strong>Appointment ID:</strong> ${item.appointment_id ?? "N/A"}</div>
                <div><strong>Patient Name:</strong> ${item.patient_name ?? "N/A"}</div>
                <div><strong>Doctor Name:</strong> ${item.doctor_name ?? "N/A"}</div>
                <div><strong>Doctor Specialization:</strong> ${item.specialization ?? "N/A"}</div>
                <div><strong>Date:</strong> ${item.appointment_date ?? "N/A"}</div>
                <div><strong>Time:</strong> ${item.appointment_time ?? "N/A"}</div>
                <div><strong>Reason:</strong> ${item.reason ?? "N/A"}</div>
                <div><strong>Status:</strong> ${item.request_status ?? "N/A"}</div>
            `;

					div.addEventListener("click", () => {
						const appointmentId = item.appointment_id;

						if (!appointmentId) {
							// debugBox.textContent =
								// "Appointment ID missing for selected card.";
							// return;
						}

						window.location.href = `./appointment-message.html?appointment_id=${encodeURIComponent(appointmentId)}`;
					});

					container.appendChild(div);
				});
			} catch (err) {
				console.error("Failed to load appointments:", err);
				status.innerHTML = `<span class="error">Failed to load appointment list.</span>`;
				// debugBox.textContent = err.message;
			}
		}
		//delete account
		document.addEventListener("DOMContentLoaded", () => {
			const deleteBtn = document.getElementById("deleteAccountBtn");
			const cancelBtn = document.getElementById("cancelDeleteBtn");
			const deleteSection = document.getElementById("deleteSection");
			const deleteForm = document.getElementById("deleteAccountForm");
			const deleteMessage = document.getElementById("deleteMessage");

			console.log("deleteBtn:", deleteBtn);
			console.log("deleteSection:", deleteSection);

			if (
				!deleteBtn ||
				!cancelBtn ||
				!deleteSection ||
				!deleteForm ||
				!deleteMessage
			) {
				console.error(
					"Some delete account elements are missing in HTML",
				);
				return;
			}

			deleteBtn.addEventListener("click", () => {
				console.log("Delete button clicked");
				deleteSection.style.display = "block";
				deleteMessage.value = "";
			});

			cancelBtn.addEventListener("click", () => {
				deleteSection.style.display = "none";
				deleteForm.reset();
				deleteMessage.value = "";
			});

			deleteForm.addEventListener("submit", async (e) => {
				e.preventDefault();

				const email = document
					.getElementById("deleteEmail")
					.value.trim();
				const password = document
					.getElementById("deletePassword")
					.value.trim();
				const confirmPassword = document
					.getElementById("confirmDeletePassword")
					.value.trim();

				if (!email || !password || !confirmPassword) {
					deleteMessage.value = "Please fill all fields";
					return;
				}

				if (password !== confirmPassword) {
					deleteMessage.value = "Passwords do not match";
					return;
				}

				try {
					const response = await fetch("/request/deleteaccount", {
						method: "POST",
						headers: {
							"Content-Type": "application/json",
						},
						body: JSON.stringify({
							email,
							password,
							confirmPassword,
						}),
					});

					const data = await response.json();

					if (!response.ok) {
						deleteMessage.value = data.message || "Deletion failed";
						return;
					}

					deleteMessage.value =
						data.message || "Account deactivated successfully";

					setTimeout(() => {
						window.location.replace("/");
					}, 1000);
				} catch (err) {
					console.error(err);
					deleteMessage.value = "Deletion failed";
				}
			});
		});
	</script>
</html>
