<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<title>Appointment Chat</title>
		<style>
			body {
				margin: 0;
				font-family: sans-serif;
				display: flex;
				flex-direction: column;
				height: 100vh;
			}

			header {
				padding: 8px 12px;
				border-bottom: 1px solid #ccc;
				display: flex;
				align-items: center;
				justify-content: space-between;
			}

			#videoLinkTitle {
				font-size: 20px;
				font-weight: bold;
			}

			#deleteChatBtn {
				font-size: 12px;
				padding: 4px 8px;
			}

			#messagesContainer {
				flex: 1;
				overflow-y: auto;
				padding: 8px 12px;
				background: #f5f5f5;
			}

			.message {
				background: #fff;
				border: 1px solid #ddd;
				padding: 6px 8px;
				margin-bottom: 6px;
			}

			.message-header {
				font-weight: bold;
				font-size: 13px;
				margin-bottom: 2px;
			}

			.message-meta {
				font-size: 11px;
				color: #666;
				margin-bottom: 4px;
			}

			.message-text {
				font-size: 14px;
				white-space: pre-wrap;
			}

			.input-area {
				border-top: 1px solid #ccc;
				padding: 6px 8px;
				display: flex;
				gap: 6px;
			}

			#messageInput {
				flex: 1;
				min-height: 40px;
				resize: none;
			}

			#sendBtn {
				padding: 4px 10px;
				font-size: 13px;
			}
		</style>
	</head>
	<body>
		<header>
			<div id="videoLinkTitle">📹 Video call link</div>
			<button id="deleteChatBtn">Delete chat</button>
		</header>

		<main id="messagesContainer">
			<!-- messages go here -->
		</main>

		<div class="input-area">
			<textarea
				id="messageInput"
				placeholder="Message..."
				rows="2"
			></textarea>
			<button id="sendBtn">Send</button>
		</div>

		<script>
			const messagesContainer =
				document.getElementById("messagesContainer");
			const messageInput = document.getElementById("messageInput");
			const sendBtn = document.getElementById("sendBtn");
			const deleteChatBtn = document.getElementById("deleteChatBtn");

			const params = new URLSearchParams(window.location.search);
			const appointmentId = params.get("appointment_id");

			if (!appointmentId) {
				alert("Missing appointment_id in URL");
			}

			const currentUserId = window.CURRENT_USER_ID || null;
			const currentUserRole = window.CURRENT_USER_ROLE || null;

			function formatDateTime(str) {
				if (!str) return "";
				const d = new Date(str);
				if (Number.isNaN(d.getTime())) return str;
				return d.toLocaleString();
			}

			function createMessageElement(msg) {
				const div = document.createElement("div");
				div.className = "message";

				const header = document.createElement("div");
				header.className = "message-header";
				header.textContent =
					msg.sender_display_name ||
					(msg.sender_role === "doctor" ? "Doctor" : "Patient");

				const meta = document.createElement("div");
				meta.className = "message-meta";
				meta.textContent = formatDateTime(msg.sent_at);

				const body = document.createElement("div");
				body.className = "message-text";
				body.textContent = msg.message_text;

				div.appendChild(header);
				div.appendChild(meta);
				div.appendChild(body);

				return div;
			}

			async function loadMessages() {
				if (!appointmentId) {
					messagesContainer.innerHTML = "appointmentId missing";
					return;
				}

				messagesContainer.innerHTML = "Loading messages...";

				try {
					const res = await fetch(
						`/loaddata/loadmessages?appointment_id=${encodeURIComponent(appointmentId)}`,
					);

					console.log("status =", res.status);
					console.log(
						"content-type =",
						res.headers.get("content-type"),
					);

					const text = await res.text();
					console.log("raw response =", text);

					let data;
					try {
						data = JSON.parse(text);
					} catch (e) {
						messagesContainer.innerHTML =
							"Response is not valid JSON";
						return;
					}

					console.log("parsed data =", data);

					if (!res.ok) {
						messagesContainer.innerHTML = `Failed to load messages: ${data.message || "Unknown error"}`;
						return;
					}

					if (!Array.isArray(data)) {
						messagesContainer.innerHTML =
							"Response is not an array";
						return;
					}

					if (data.length === 0) {
						messagesContainer.innerHTML = "No messages yet.";
						return;
					}

					messagesContainer.innerHTML = "";
					data.forEach((msg) => {
						const div = document.createElement("div");
						div.innerHTML = `
                <div><strong>${msg.sender_display_name || msg.sender_role}</strong></div>
                <div>${msg.message_text}</div>
                <div>${msg.sent_at}</div>
            `;
						messagesContainer.appendChild(div);
					});
				} catch (err) {
					console.error(err);
					messagesContainer.innerHTML = `Error: ${err.message}`;
				}
			}

			async function sendMessage() {
				const text = messageInput.value.trim();

				if (!text || !appointmentId) {
					alert("Message text or appointment ID missing");
					return;
				}

				const payload = {
					appointment_id: appointmentId,
					message_text: text,
				};

				try {
					console.log("Sending payload:", payload);

					const res = await fetch("/request/sendmessage", {
						method: "POST",
						headers: {
							"Content-Type": "application/json",
						},
						body: JSON.stringify(payload),
					});

					console.log("sendMessage status:", res.status);
					console.log("sendMessage ok:", res.ok);
					console.log(
						"sendMessage content-type:",
						res.headers.get("content-type"),
					);

					const rawText = await res.text();
					console.log("sendMessage raw response:", rawText);

					let data;
					try {
						data = JSON.parse(rawText);
					} catch (e) {
						alert(
							`Server did not return JSON.\nStatus: ${res.status}\nResponse: ${rawText}`,
						);
						return;
					}

					console.log("sendMessage parsed response:", data);

					if (!res.ok) {
						alert(
							`Send failed [${res.status}]: ${data.message || "Unknown error"}`,
						);
						return;
					}

					messageInput.value = "";
					await loadMessages();
				} catch (err) {
					console.error("sendMessage error:", err);
					alert(`Error sending message: ${err.message}`);
				}
			}

			async function deleteChat() {
				if (!appointmentId) {
					alert("Appointment ID missing");
					return;
				}

				const ok = confirm(
					"Delete all chat messages for this appointment?",
				);
				if (!ok) return;

				try {
					const res = await fetch(
						`/request/deletechat?appointment_id=${encodeURIComponent(appointmentId)}`,
						{
							method: "DELETE",
						},
					);

					const data = await res.json();

					if (!res.ok) {
						alert(data.message || "Failed to delete chat");
						return;
					}

					alert(data.message || "Chat deleted successfully");
					await loadMessages();
				} catch (err) {
					console.error("deleteChat error:", err);
					alert("Error deleting chat");
				}
			}

			sendBtn.addEventListener("click", sendMessage);

			messageInput.addEventListener("keydown", (e) => {
				if (e.key === "Enter" && !e.shiftKey) {
					e.preventDefault();
					sendMessage();
				}
			});

			deleteChatBtn.addEventListener("click", deleteChat);

			document.addEventListener("DOMContentLoaded", loadMessages);
			window.addEventListener("load", loadMessages);
		</script>
	</body>
</html>
