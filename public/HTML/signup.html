<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>signup</title>
	</head>
	<body>
		<form id="signupForm">
			<div class="row">
				<label for="Name">Name</label>
				<input type="text" id="Name" name="Name" required />
			</div>
			<div>
				<label for="email">Email</label>
				<input type="email" id="email" name="email" required />
			</div>
			<div>
				<label for="password">Password</label>
				<input type="password" id="password" name="password" required />
			</div>
			<div>
				<label for="confirmPassword">Confirm Password</label>
				<input
					type="password"
					id="confirmPassword"
					name="confirmPassword"
					required
				/>
			</div>
			<div>
				<label for="phone">Phone Number</label>
				<input
					type="tel"
					id="phone"
					name="tel"
					autocomplete="tel"
					pattern="[0-9]{10}"
					required
				/>
			</div>

			<div>
				<label for="dob">Date of Birth</label>
				<input type="date" id="dob" name="dob" required />
			</div>
			<div>
				<label>Gender</label>
				<div class="radio-group">
					<input
						type="radio"
						id="male"
						name="gender"
						value="male"
						required
					/>
					<label for="male">Male</label>
					<input
						type="radio"
						id="female"
						name="gender"
						value="female"
						required
					/>
					<label for="female">Female</label>
				</div>
			</div>

			<div class="checkbox-group">
				<input type="checkbox" id="terms" name="terms" required />
				<label for="terms">I agree to the terms and conditions</label>
			</div>
			<button type="submit">Sign Up</button>
		</form>
		<input id="result" type="text" placeholder="Result" readonly />
		<script>
			document
				.getElementById("signupForm")
				.addEventListener("submit", signupUser);

			async function signupUser(e) {
				e.preventDefault();

				const name = document.getElementById("Name").value;
				const email = document.getElementById("email").value;
				const password = document.getElementById("password").value;
				const confirmPassword =
					document.getElementById("confirmPassword").value;
				const phone_no = document.getElementById("phone").value;
				const dob = document.getElementById("dob").value;
				const gender = document.querySelector(
					'input[name="gender"]:checked',
				)?.value;
				const terms = document.getElementById("terms").checked;
				const result = document.getElementById("result");

				if (password !== confirmPassword) {
					alert("Passwords do not match");
					return;
				}
				console.log("frontend gender =", gender, typeof gender);
				try {
					const response = await fetch("/signup/patient", {
						method: "POST",
						headers: {
							"Content-Type": "application/json",
						},
						body: JSON.stringify({
							name,
							email,
							password,
							phone_no,
							dob,
							gender,
						}),
					});

					const text = await response.text();
					let data;

					try {
						data = JSON.parse(text);
					} catch (jsonError) {
						result.value = "Server did not return valid JSON";
						console.error("Raw response:", text);
						return;
					}

					result.value = data.message || "Signup request sent";

					if (response.ok && data.redirect) {
						window.location.href = data.redirect;
					}
				} catch (err) {
					console.error("Signup request failed:", err);
					result.value = "Request failed: " + err.message;
				}
			}
		</script>
	</body>
</html>
